# Webycash Redis — performance tuned
# IO threads for parallel network I/O (reads + writes)
io-threads 8
io-threads-do-reads yes

# Event loop frequency (default 10, max 500)
hz 100

# TCP backlog for high connection throughput
tcp-backlog 8192

# Disable persistence for max throughput (data is reconstructable from FDB)
save ""
appendonly no

# Max memory — use all available
maxmemory 0

# Disable slow log noise
slowlog-log-slower-than 10000

# Lua script timeout (ms) — allow long pipelines
lua-time-limit 10000

# Max clients
maxclients 65536

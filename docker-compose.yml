services:
  # 3-node Redis cluster for parallel sharded throughput
  redis-1: &redis-base
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: >
      redis-server --port 6379
      --io-threads 4 --io-threads-do-reads yes
      --hz 100 --tcp-backlog 8192
      --save "" --appendonly no
      --maxclients 65536 --lua-time-limit 10000
      --loglevel warning
    volumes: [redis-data-1:/data]

  redis-2:
    <<: *redis-base
    ports: ["6380:6379"]
    command: >
      redis-server --port 6379
      --io-threads 4 --io-threads-do-reads yes
      --hz 100 --tcp-backlog 8192
      --save "" --appendonly no
      --maxclients 65536 --lua-time-limit 10000
      --loglevel warning
    volumes: [redis-data-2:/data]

  redis-3:
    <<: *redis-base
    ports: ["6381:6379"]
    command: >
      redis-server --port 6379
      --io-threads 4 --io-threads-do-reads yes
      --hz 100 --tcp-backlog 8192
      --save "" --appendonly no
      --maxclients 65536 --lua-time-limit 10000
      --loglevel warning
    volumes: [redis-data-3:/data]

  foundationdb:
    image: foundationdb/foundationdb:7.3.43
    ports:
      - "4500:4500"
    environment:
      FDB_NETWORKING_MODE: host
    volumes:
      - fdb-data:/var/fdb/data

  fdb-init:
    image: foundationdb/foundationdb:7.3.43
    depends_on:
      - foundationdb
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        sleep 2
        fdbcli --exec "configure new single memory"
        echo "FoundationDB initialized"

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"

volumes:
  redis-data-1:
  redis-data-2:
  redis-data-3:
  fdb-data:

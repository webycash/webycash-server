name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Lint + unit tests ────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (default — webcash-only)
        run: cargo clippy --all-targets -- -W clippy::all

      - name: Clippy (referee)
        run: cargo clippy -p referee --all-targets -- -W clippy::all

      - name: Build all asset binaries + referee
        run: |
          cargo build -p webycash-server-webcash
          cargo build -p webycash-server-rgb
          cargo build -p webycash-server-rgb-collectible
          cargo build -p webycash-server-voucher
          cargo build -p referee

      - name: Unit + property tests (no docker required)
        run: |
          cargo test -p referee
          cargo test -p webycash-conformance \
            --test record_codec_props \
            --test wire_format_props \
            --test storage_key_props \
            --test fuzz_parsers \
            --test production_fixture_invariants

  # ── Conformance suite (docker-spawned servers) ───────────────────
  conformance:
    name: Conformance (docker)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build asset binaries
        run: |
          cargo build -p webycash-server-webcash
          cargo build -p webycash-server-rgb
          cargo build -p webycash-server-rgb-collectible
          cargo build -p webycash-server-voucher

      - name: Run docker-spawned conformance suite
        run: cargo test -p webycash-conformance --tests -- --test-threads=2

  # ── MSRV ─────────────────────────────────────────────────────────
  msrv:
    name: MSRV (1.91)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.91
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p webycash-server-webcash

  # ── Release: build all five binaries per target and publish ──────
  release:
    name: Release (${{ matrix.target }})
    needs: [test, conformance]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build all binaries
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }} -p webycash-server-webcash
          cargo build --release --target ${{ matrix.target }} -p webycash-server-rgb
          cargo build --release --target ${{ matrix.target }} -p webycash-server-rgb-collectible
          cargo build --release --target ${{ matrix.target }} -p webycash-server-voucher
          # Referee builds with its production crypto features.
          cargo build --release --target ${{ matrix.target }} -p referee \
            --features zkp-arkworks,musig2-real

      - name: Package release
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARGET="${{ matrix.target }}"
          STAGING="webycash-server-${VERSION}-${TARGET}"
          mkdir -p "$STAGING"
          cp LICENSE README.md "$STAGING/" 2>/dev/null || true
          for bin in webycash-server-webcash webycash-server-rgb webycash-server-rgb-collectible webycash-server-voucher referee; do
            cp "target/${TARGET}/release/${bin}" "$STAGING/"
          done
          tar czf "${STAGING}.tar.gz" "$STAGING"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"
          else
            shasum -a 256 "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            webycash-server-*.tar.gz
            webycash-server-*.tar.gz.sha256

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -- -W clippy::all
      - run: cargo test --all

  build-release:
    needs: test
    if: github.event_name == 'release' && !github.event.release.prerelease
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: webycash-server-linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: webycash-server-linux-aarch64
          - target: x86_64-unknown-freebsd
            os: ubuntu-latest
            artifact: webycash-server-freebsd-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        run: |
          cross build --release --target ${{ matrix.target }} --bin webycash-server

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/webycash-server dist/ 2>/dev/null || \
            cp target/${{ matrix.target }}/release/webycash-server.exe dist/ 2>/dev/null || true
          cp LICENSE README.md dist/
          cp -r config/ dist/config/
          cd dist && tar czf ../${{ matrix.artifact }}.tar.gz *

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.tar.gz

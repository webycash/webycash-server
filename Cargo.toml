[workspace]
resolver = "2"
members = ["crates/server", "crates/macros"]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
license = "MIT"
authors = ["Webycash Developers"]
repository = "https://github.com/webycash/webycash-server"

[workspace.dependencies]
# HTTP (hyper only — no actix-web)
hyper = { version = "1", features = ["http1", "http2", "server"] }
hyper-util = { version = "0.1", features = ["tokio", "server-auto", "http2"] }
http = "1"
http-body-util = "0.1"
bytes = "1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Async
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
futures = "0.3"

# Actor framework (ractor — Erlang-inspired, native tokio)
ractor = "0.12"

# Parser combinators
nom = "7"

# Crypto
sha2 = "0.10"
hex = "0.4"

# Databases
aws-config = "1"
aws-sdk-dynamodb = "1"
serde_dynamo = { version = "4", features = ["aws-sdk-dynamodb+1"] }
redis = { version = "0.27", features = ["tokio-comp", "connection-manager"] }
foundationdb = { version = "0.10", features = ["embedded-fdb-include", "fdb-7_3"] }

# Error handling
thiserror = "2"
anyhow = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Config
toml = "0.8"

# Time
chrono = { version = "0.4", features = ["serde"] }

# Proc macros
syn = { version = "2", features = ["full", "extra-traits", "parsing"] }
quote = "1"
proc-macro2 = "1"

# Misc
uuid = { version = "1", features = ["v4", "serde"] }
rand = "0.8"
